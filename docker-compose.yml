services:
  db:
    image: postgres:18
    container_name: language_app_db
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: language_app

    ports:
      # Host 5432 often conflicts with a local Postgres install; use 5433 on the host.
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: