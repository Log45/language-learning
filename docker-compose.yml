services:
  db:
    image: postgres:18
    container_name: language_app_db
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: language_app

    ports:
      # Host 5432 often conflicts with a local Postgres install; use 5433 on the host.
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

  neo4j:
    image: neo4j:5
    container_name: language_app_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data: